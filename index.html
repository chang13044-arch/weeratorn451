<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบวิเคราะห์ข้อมูล</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    text-align:center;
}
.container {
    width:95%;
    max-width:1200px;
    margin:auto;
    padding:20px;
}
.controls {
    margin-bottom:20px;
}
input,select,button {
    padding:8px;
    margin:5px;
    border-radius:8px;
    border:none;
}
button {
    cursor:pointer;
    background:#00c6ff;
}
.card {
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}
canvas {
    background:white;
    border-radius:15px;
    padding:10px;
}
</style>
</head>

<body>

<div class="container">
<h1>ระบบวิเคราะห์ข้อมูล</h1>

<div class="controls">
<input type="file" id="fileInput">
<input type="number" id="filterInput" placeholder="Filter มากกว่า...">
<select id="chartType">
<option value="bar">Bar</option>
<option value="line">Line</option>
<option value="pie">Pie</option>
</select>
<button onclick="exportPDF()">Export PDF</button>
</div>

<div class="card">
<p>จำนวนข้อมูล: <span id="count">0</span></p>
<p>ค่าเฉลี่ย: <span id="avg">0</span></p>
<p>ค่าสูงสุด: <span id="max">0</span></p>
<p>ค่าต่ำสุด: <span id="min">0</span></p>
<p>มัธยฐาน: <span id="median">0</span></p>
<p>Std Dev: <span id="std">0</span></p>
</div>

<div class="card">
<canvas id="chartCanvas"></canvas>
</div>

<div class="card">
<h3>Insight</h3>
<p id="insightBox">Insight จะแสดงที่นี่</p>
</div>

</div>

<script>

let originalData = [];
let chart;

document.getElementById("fileInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
        originalData = reader.result.split(/[\r\n,]+/).map(Number).filter(n=>!isNaN(n));
        updateDashboard();
    };
    reader.readAsText(e.target.files[0]);
});

document.getElementById("filterInput").addEventListener("input", updateDashboard);
document.getElementById("chartType").addEventListener("change", updateDashboard);

function updateDashboard(){
    if(originalData.length===0) return;

    const filterValue = Number(document.getElementById("filterInput").value);
    let data = originalData.filter(n=>!filterValue || n>filterValue);
    if(data.length===0) return;

    const count = data.length;
    const avg = data.reduce((a,b)=>a+b,0)/count;
    const max = Math.max(...data);
    const min = Math.min(...data);
    const sorted = [...data].sort((a,b)=>a-b);
    const median = sorted.length%2===0 ?
        (sorted[count/2-1]+sorted[count/2])/2 :
        sorted[Math.floor(count/2)];
    const variance = data.reduce((a,b)=>a+(b-avg)**2,0)/count;
    const std = Math.sqrt(variance);

    document.getElementById("count").innerText=count;
    document.getElementById("avg").innerText=avg.toFixed(2);
    document.getElementById("max").innerText=max;
    document.getElementById("min").innerText=min;
    document.getElementById("median").innerText=median;
    document.getElementById("std").innerText=std.toFixed(2);

    generateInsight(avg,std);
    renderChart(data);
}

function renderChart(data){
    if(chart) chart.destroy();
    const ctx=document.getElementById("chartCanvas");
    chart=new Chart(ctx,{
        type:document.getElementById("chartType").value,
        data:{
            labels:data.map((_,i)=>"Data "+(i+1)),
            datasets:[{
                label:"ข้อมูล",
                data:data
            }]
        }
    });
}

function generateInsight(avg,std){
    let text="";
    if(std>avg*0.3) text="ข้อมูลมีการกระจายตัวสูง";
    else text="ข้อมูลมีความสม่ำเสมอ";
    document.getElementById("insightBox").innerText=text;
}

function exportPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    doc.text("Data Analytics Report",10,10);
    doc.text("Count: "+document.getElementById("count").innerText,10,20);
    doc.text("Average: "+document.getElementById("avg").innerText,10,30);
    doc.text("Max: "+document.getElementById("max").innerText,10,40);
    doc.text("Min: "+document.getElementById("min").innerText,10,50);
    doc.text("Median: "+document.getElementById("median").innerText,10,60);
    doc.text("Std Dev: "+document.getElementById("std").innerText,10,70);
    doc.save("report.pdf");
}

</script>

</body>
</html>
